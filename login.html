<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMPUGAMES | Login</title>
    <!-- Shared Styles (Colors, Fonts) -->
    <link rel="stylesheet" href="style.css">
    <!-- Login Specific Styles -->
    <link rel="stylesheet" href="login.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Background Overlay for atmosphere -->
    <div class="background-overlay"></div>

    <!-- Back to Home Button -->
    <a href="index.html" class="back-home-btn">
        <i class="fas fa-arrow-left"></i> <span data-translate="back_home">BACK TO HOME</span>
    </a>

    <!-- Main Login Terminal Box -->
    <div class="login-container">
        <div class="login-card" id="glass-card">
            <!-- Pulsing red line top -->
            <div class="glow-line-top"></div>

            <div class="login-header">
                <!-- Repeated the cool shining star logo from Home -->
                <svg class="login-logo" viewBox="0 0 100 100" fill="white">
                    <path d="M50 5 L60 25 L85 25 L65 40 L75 65 L50 50 L25 65 L35 40 L15 25 L40 25 Z" />
                    <rect x="49" y="25" width="2" height="60" />
                    <rect x="40" y="70" width="20" height="1" />
                </svg>
                <h2 data-translate="access_terminal">ACCESS TERMINAL</h2>
                <p data-translate="enter_credentials">Enter your credentials to establish connection</p>
            </div>

            <!-- Login entries -->
            <form class="login-form" action="#" method="POST"
                onsubmit="event.preventDefault(); window.location.href='index.html';">

                <div class="input-group">
                    <i class="fas fa-envelope icon"></i>
                    <!-- Notice the placeholder=" ", this is a CSS trick used to achieve the floating label label -->
                    <input type="text" id="email" required placeholder=" " autocomplete="off">
                    <label for="email" data-translate="username_email">Username or Email</label>
                    <div class="input-glow"></div>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="password" required placeholder=" " autocomplete="off">
                    <label for="password" data-translate="password">Password</label>
                    <div class="input-glow"></div>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox">
                        <span class="checkmark"></span>
                        <span data-translate="remember_me">Remember Me</span>
                    </label>
                    <a href="#" class="forgot-pwd" data-translate="forgot_password">Forgot password?</a>
                </div>

                <!-- Custom Jagged Submission Button -->
                <button type="submit" class="login-submit-btn">
                    <span data-translate="initialize">INITIALIZE</span>
                    <i class="fas fa-chevron-right"></i>
                </button>
            </form>

            <div class="social-login-divider">
                <span data-translate="or_login_via">OR LOGIN VIA SECURE LINK</span>
            </div>

            <div class="social-login-buttons">
                <button class="social-btn google"><i class="fab fa-google"></i></button>
                <button class="social-btn discord"><i class="fab fa-discord"></i></button>
                <button class="social-btn steam"><i class="fab fa-steam"></i></button>
                <button class="social-btn playstation"><i class="fab fa-playstation"></i></button>
            </div>

            <div class="register-prompt">
                <p><span data-translate="new_user">New user?</span> <a href="#" data-translate="create_account">Create
                        Account</a></p>
            </div>

            <!-- Pulsing red line bottom -->
            <div class="glow-line-bottom"></div>
        </div>

        <!-- Language Selector Bottom Right -->
        <div class="language-selector">
            <i class="fas fa-globe"></i>
            <select id="lang-switch">
                <option value="es">ESP</option>
                <option value="en">ENG</option>
                <option value="jp">JPN</option>
            </select>
            <i class="fas fa-chevron-down select-arrow"></i>
        </div>
    </div>

    <!-- Mouse glowing effect script that follows your cursor -->
    <script>
        const card = document.getElementById('glass-card');
        if (card) {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left; // x position within the element.
                const y = e.clientY - rect.top;  // y position within the element.
                card.style.setProperty('--mouse-x', `${x}px`);
                card.style.setProperty('--mouse-y', `${y}px`);
            });
            // Reset to middle when left
            card.addEventListener('mouseleave', () => {
                card.style.setProperty('--mouse-x', `50%`);
                card.style.setProperty('--mouse-y', `50%`);
            });
        }
    </script>

    <!-- Central Script for language logic -->
    <script src="script.js"></script>
</body>

</html>
