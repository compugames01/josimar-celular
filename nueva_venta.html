<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Nueva Venta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/nuevo_registro.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="form-wrapper">
        <div class="form-card">
            <div class="form-header">
                <div class="icon-container" style="background: rgba(16, 185, 129, 0.1);">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="1" x2="12" y2="23"></line>
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="modal-title">Registrar Nueva Venta</h1>
                    <p>Completa los datos para generar una nueva orden de venta.</p>
                </div>
            </div>

            <form id="venta-form">
                <div class="form-grid">
                    <div class="input-group full-width">
                        <label for="ventaCliente">Nombre del Cliente</label>
                        <input type="text" id="ventaCliente" placeholder="Ej: Juan Pérez" required>
                    </div>

                    <div class="input-group full-width">
                        <label for="ventaProducto">Seleccionar Producto</label>
                        <select id="ventaProducto" required>
                            <option value="" disabled selected>Cargando productos...</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label for="ventaCantidad">Cantidad a Vender (Uds.)</label>
                        <input type="number" id="ventaCantidad" placeholder="Ej: 2" min="1" required>
                    </div>
                </div>

                <div id="success-msg" class="success-message hidden"
                    style="background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.3);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <div>
                        <span class="success-title"
                            style="font-weight:bold; display:block; margin-bottom:4px; color: #10B981;">¡Venta
                            Exitosa!</span>
                        <p style="margin:0;">La venta ha sido procesada y el inventario actualizado. Puedes cerrar esta
                            pestaña.</p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary btn-submit"
                        style="background: linear-gradient(135deg, #10b981, #059669); border: none;">
                        <span>Procesar Venta</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/nueva_venta.js"></script>
</body>

</html>
