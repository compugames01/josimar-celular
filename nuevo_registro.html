<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario Pro - Nuevo Registro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/nuevo_registro.css">
</head>

<body>
    <div class="background-effects">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
        <div class="grid-overlay"></div>
    </div>

    <main class="form-wrapper">
        <div class="form-card">
            <div class="form-header">
                <div class="icon-container">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#gold_grad)"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <defs>
                            <linearGradient id="gold_grad" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#FDE047" />
                                <stop offset="1" stop-color="#D97706" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <div>
                    <h1 class="modal-title">Registrar Nuevo Producto</h1>
                    <p>Agrega un nuevo elemento al inventario premium</p>
                </div>
            </div>

            <form id="add-form">
                <div class="form-grid">
                    <div class="input-group" id="container-itemId">
                        <label for="itemId">Nombre del producto</label>
                        <input type="text" id="itemId" placeholder="Ej: LUX-106" required>
                    </div>
                    <div class="input-group" id="container-itemName">
                        <label for="itemName">Descripción del Activo</label>
                        <input type="text" id="itemName" placeholder="Ej: iPad Pro M4" required>
                    </div>
                    <div class="input-group" id="container-itemBrand">
                        <label for="itemBrand">Marca / Fabricante</label>
                        <select id="itemBrand" required>
                            <option value="" disabled selected>Selecciona una marca</option>
                            <option value="Apple">Apple</option>
                            <option value="Samsung">Samsung</option>
                            <option value="ZTE">ZTE</option>
                            <option value="Xiaomi">Xiaomi</option>
                            <option value="Motorola">Motorola</option>
                            <option value="Nokia">Nokia</option>
                            <option value="Huawei">Huawei</option>
                            <option value="Oppo">Oppo</option>
                        </select>
                    </div>
                    <div class="input-group" id="container-itemType" style="display: none;">
                        <label for="itemType">Tipo de Cable</label>
                        <select id="itemType">
                            <option value="" disabled selected>Selecciona un tipo</option>
                            <option value="Tipo C">Tipo C</option>
                            <option value="Lightning">Lightning</option>
                            <option value="Antiguos">Antiguos</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="itemCategory">Categoría de Componente</label>
                        <select id="itemCategory" required>
                            <option value="" disabled selected>Selecciona una categoría</option>
                            <option value="Carcasa">Carcasa</option>
                            <option value="Batería">Batería</option>
                            <option value="Pantalla">Pantalla</option>
                            <option value="Mica">Mica</option>
                            <option value="Accesorios">Accesorios</option>
                            <option value="Cargadores">Cargadores</option>
                            <option value="Audífonos Inalámbricos">Audífonos Inalámbricos</option>
                            <option value="Audífonos Alámbricos">Audífonos Alámbricos</option>
                            <option value="Cable de Carga">Cable de Carga</option>
                            <option value="Parlantes">Parlantes</option>
                            <option value="Cámara Frontal">Cámara Frontal</option>
                            <option value="Cámara Trasera">Cámara Trasera</option>
                            <option value="Placa Madre">Placa Madre</option>
                            <option value="Módulo de Carga">Módulo de Carga</option>
                            <option value="Flex de Pantalla">Flex de Pantalla</option>
                            <option value="Flex de Carga">Flex de Carga</option>
                            <option value="Bandeja de Chip">Bandeja de Chip</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="itemStock">Existencias (Uds.)</label>
                        <input type="number" id="itemStock" placeholder="Ej: 10" min="0" required>
                    </div>
                    <div class="input-group full-width">
                        <label for="itemPrice">Precio de Venta</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="itemCurrency" class="select-premium" style="width: 100px; padding: 12px 8px;">
                                <option value="S/">Soles (S/)</option>
                                <option value="$">Dólares ($)</option>
                            </select>
                            <input type="text" id="itemPrice" placeholder="Ej: 1,299.00" style="flex: 1;" required>
                        </div>
                    </div>
                </div>

                <div id="success-msg" class="success-message hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    <div>
                        <span class="success-title" style="font-weight:bold; display:block; margin-bottom:4px;">¡Ojo
                            Clínico!</span>
                        <p style="margin:0;">El registro ha sido creado exitosamente. Puedes cerrar esta pestaña.</p>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="btn-cancel" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary btn-submit">
                        <span>Guardar Registro</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/nuevo_registro.js"></script>
</body>

</html>
